    function buildColorScale(metricName) {
        return colorScales[metricName] || colorScales["default"];
    }

    function getColorConfig(metric, value) {
        const scale = buildColorScale(metric);
        for (let i = 0; i < scale.length; i++) {
            if (value <= scale[i].limit) {
                return scale[i].col;
            }
        }
        return scale[scale.length - 1].col;
    }

    function generateChart(canvasId, item) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const labels = [];
        const values = [];
        const bgColors = [];
        const borderColors = [];
        const normalizedValues = [];

        for (const [key, val] of Object.entries(item.metrics)) {
            if (typeof val !== 'number') continue;

            labels.push(key.length > 32 ? key.substring(0, 30) + '...' : key);
            values.push(val);

            const color = getColorConfig(key, val);
            bgColors.push(color + '99');
            borderColors.push(color);

            const scale = buildColorScale(key);
            const refLimit = scale.length >= 2 ? scale[1].limit : 1;
            const norm = refLimit === Infinity ? 100 : Math.min((val / refLimit) * 100, 200);
            normalizedValues.push(norm);
        }

        if (labels.length === 0) return;

        const height = Math.max(230, labels.length * 28 + 70);
        canvas.parentElement.style.height = height + 'px';
        canvas.height = height;

        new Chart(canvas, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '% від допустимого рівня',
                    data: normalizedValues,
                    backgroundColor: bgColors,
                    borderColor: borderColors,
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return values[ctx.dataIndex] + ' (' + ctx.parsed.x.toFixed(1) + '% від допустимого рівня)';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '% від допустимого рівня',
                            font: { size: 10 }
                        }
                    },
                    y: {
                        ticks: { font: { size: 9 } }
                    }
                }
            }
        });
    }

    function initDashboard() {
        const mapInstance = window[mapInstanceName];

        if (!mapInstance) {
            setTimeout(initDashboard, 100);
            return;
        }

        currentMarkerGroup = L.layerGroup().addTo(mapInstance);
        initLayerMenu();

        const firstBtn = document.querySelector('.layer-panel .btn');
        if (firstBtn) firstBtn.click();
    }

    function initLayerMenu() {
        const menu = document.getElementById("layerMenu");
        menu.innerHTML = "<b>Шари карти</b><hr style='margin:5px 0'>";

        for (const [key, label] of Object.entries(mapLayersInfo)) {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.innerHTML = label;
            btn.onclick = () => selectLayer(key, btn);
            menu.appendChild(btn);
        }
    }

    function selectLayer(type, btnElement) {
        document.querySelectorAll('.layer-panel .btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        activeType = type;

        let metricsSet = new Set();
        mapData.filter(d => d.type === type).forEach(item => {
            Object.keys(item.metrics).forEach(metricName => metricsSet.add(metricName));
        });

        const availableMetrics = Array.from(metricsSet);

        if (availableMetrics.length > 0) {
            activeMetric = availableMetrics[0];
            renderMetricMenu(availableMetrics);
            renderMap();
        } else {
            document.getElementById("metricMenu").style.display = "none";
            document.getElementById("legendMenu").style.display = "none";
            currentMarkerGroup.clearLayers();
        }
    }

    function renderMetricMenu(metrics) {
        const menu = document.getElementById("metricMenu");
        menu.style.display = "block";
        menu.innerHTML = "<b>Показник для фільтрації</b><hr style='margin:5px 0'>";

        metrics.forEach(metricName => {
            const label = document.createElement("label");
            label.className = "metric-radio";

            const radio = document.createElement("input");
            radio.type = "radio";
            radio.name = "metric";
            radio.value = metricName;
            radio.checked = metricName === activeMetric;

            radio.onchange = () => {
                activeMetric = metricName;
                renderMap();
            };

            const span = document.createElement("span");
            span.textContent = metricName;

            label.appendChild(radio);
            label.appendChild(span);
            menu.appendChild(label);
        });
    }

    function renderMap() {
        currentMarkerGroup.clearLayers();

        mapData.filter(d => d.type === activeType).forEach(item => {
            if (item.metrics[activeMetric] === undefined) return;

            const val = item.metrics[activeMetric];
            const isNumeric = typeof val === 'number';

            const color = isNumeric ? getColorConfig(activeMetric, val) : '#6c757d';
            const displayVal = isNumeric && val < 0.01 && val > 0 ? val.toExponential(1) : val;

            const strLen = String(displayVal).length;
            const size = Math.max(42, strLen * 8 + 18);

            const iconHtml = `
                <div class='dynamic-marker'
                     style='background-color:${color}; width:${size}px; height:${size}px;'>
                    ${displayVal}
                </div>
            `;

            const customIcon = L.divIcon({
                html: iconHtml,
                className: '',
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2]
            });

            let popupText = `<b>${item.name}</b><br><hr style='margin:5px 0'>`;

            for (let [k, v] of Object.entries(item.metrics)) {
                popupText += `${k}: <b>${v}</b><br>`;
            }

            const chartId = 'chart_' + (chartCounter++);

            popupText += `
                <div class='popup-chart-container'>
                    <b>Графік паспортних показників</b>
                    <div style='position:relative; width:100%; height:260px;'>
                        <canvas id='${chartId}'></canvas>
                    </div>
                </div>
            `;

            const marker = L.marker(item.loc, { icon: customIcon })
                .bindPopup(popupText, { maxWidth: 430, minWidth: 410 })
                .addTo(currentMarkerGroup);

            marker._chartData = {
                canvasId: chartId,
                item: item
            };

            marker.on('popupopen', function () {
                setTimeout(() => {
                    generateChart(this._chartData.canvasId, this._chartData.item);
                }, 120);
            });
        });

        renderLegend();
    }

    function renderLegend() {
        const legend = document.getElementById("legendMenu");
        legend.style.display = "block";
        legend.innerHTML = `<b>${activeMetric}</b><hr style='margin:5px 0'>`;

        const hasNonNumeric = mapData
            .filter(d => d.type === activeType)
            .some(item => item.metrics[activeMetric] !== undefined && typeof item.metrics[activeMetric] !== 'number');

        if (hasNonNumeric) {
            legend.innerHTML += `
                <div class='legend-row' style='background-color:#6c757d'>
                    <span>Текстове значення</span>
                    <span>—</span>
                </div>
            `;
            return;
        }

        const scale = buildColorScale(activeMetric);

        scale.forEach(s => {
            legend.innerHTML += `
                <div class='legend-row' style='background-color:${s.col}'>
                    <span>${s.lbl}</span>
                    <span style='font-size:11px;'>${s.range}</span>
                </div>
            `;
        });
    }

    initDashboard();
</script>
